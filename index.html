<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Hundepasserne Holmberg</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f1e8;
}

header {
    text-align: center;
    padding: 30px;
}

header img {
    width: 200px;
}

h1 {
    color: #2f6f6d;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.day {
    background: #ecf0f1;
    padding: 12px;
    text-align: center;
    border-radius: 5px;
    cursor: pointer;
}

.selected {
    background: #2f6f6d;
    color: white;
}

.booked {
    background: #e74c3c;
    color: white;
    cursor: not-allowed;
}

button {
    background: #2f6f6d;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    margin-top: 10px;
    font-size: 16px;
}

.mobilepay {
    background: #5A78FF;
}
</style>
</head>

<body>

<header>
<!-- 🔥 LOGO VIRKER HER -->
<img src="https://i.imgur.com/8Km9tLL.png" alt="Logo">

<h1>🐶 Hundepasserne Holmberg</h1>
<p>Tryg pasning af din hund</p>
</header>

<div class="container">

<div class="card">
<h2>📞 Kontakt</h2>
<p>Telefon: 61720912</p>
<p>Email: 01jehol@gmail.com</p>
</div>

<div class="card">
<h2>💰 Priser</h2>
<p>250 kr pr døgn (uden foder)</p>
<p>300 kr pr døgn (med foder)</p>
</div>

<div class="card">
<h2>📅 Kalender</h2>
<button onclick="prevMonth()">← Forrige</button>
<button onclick="nextMonth()">Næste →</button>
<h3 id="month"></h3>
<div class="calendar" id="calendar"></div>
<p style="font-size:14px;">Røde dage = optaget</p>
</div>

<div class="card">
<h2>📋 Booking</h2>

<p style="font-size:14px;">
1. Vælg datoer<br>
2. Tryk "Book via SMS"<br>
3. Send SMS<br>
4. Betal via MobilePay
</p>

<input type="text" id="navn" placeholder="Dit navn">

<select id="pris">
<option value="250">Uden foder (250 kr pr døgn)</option>
<option value="300">Med foder (300 kr pr døgn)</option>
</select>

<button onclick="book()">📩 Book via SMS</button>

<br>

<a href="https://qr.mobilepay.dk/box/e9381382-22b5-44fa-bbd8-66e93474ac1a/pay-in" target="_blank">
<button class="mobilepay">💰 Betal med MobilePay</button>
</a>

</div>

</div>

<script>
let calendar = document.getElementById("calendar");
let valgt = [];
let currentDate = new Date();

let bookedDates = [
    "2026-4-10",
    "2026-4-11"
];

function generateCalendar() {
    calendar.innerHTML = "";

    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();

    let monthName = currentDate.toLocaleString('da-DK', { month: 'long' });
    document.getElementById("month").innerText = monthName + " " + year;

    let daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 1; i <= daysInMonth; i++) {
        let day = document.createElement("div");
        day.classList.add("day");

        let fullDate = `${year}-${month+1}-${i}`;
        day.innerText = i;

        if (bookedDates.includes(fullDate)) {
            day.classList.add("booked");
        } else {
            day.onclick = () => {
                day.classList.toggle("selected");

                if (valgt.includes(fullDate)) {
                    valgt = valgt.filter(d => d !== fullDate);
                } else {
                    valgt.push(fullDate);
                }
            };
        }

        calendar.appendChild(day);
    }
}

function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    generateCalendar();
}

function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    generateCalendar();
}

function book() {
    let navn = document.getElementById("navn").value;
    let pris = document.getElementById("pris").value;

    if (navn === "") {
        alert("Skriv dit navn først!");
        return;
    }

    if (valgt.length === 0) {
        alert("Vælg datoer først!");
        return;
    }

    let total = valgt.length * pris;

    let besked = "Hej Jeppe, jeg vil gerne booke:%0A" +
                 "Navn: " + navn + "%0A" +
                 "Datoer: " + valgt.join(", ") + "%0A" +
                 "Pris: " + total + " kr";

    let smsLink = "sms:61720912?&body=" + besked;

    window.location.href = smsLink;
}

generateCalendar();
</script>

</body>
</html>
